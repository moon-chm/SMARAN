services:
  api:
    build: .
    container_name: smaran_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  caregiver_panel:
    build: .
    container_name: smaran_caregiver
    command: streamlit run frontend/caregiver_panel.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  elder_panel:
    build: .
    container_name: smaran_elder
    command: streamlit run frontend/elder_panel.py --server.port 8502 --server.address 0.0.0.0
    ports:
      - "8502:8502"
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
