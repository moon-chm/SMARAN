services:
  api:
    build: .
    container_name: smaran_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    restart: always

  caregiver_panel:
    build: .
    container_name: smaran_caregiver
    command: streamlit run frontend/caregiver_panel.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - api

  elder_panel:
    build: .
    container_name: smaran_elder
    command: streamlit run frontend/elder_panel.py --server.port 8502 --server.address 0.0.0.0
    ports:
      - "8502:8502"
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - api

  seeder:
    build: .
    container_name: smaran_seeder
    command: python scripts/seed_demo.py
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000/api
    depends_on:
      - api
    restart: "no"
